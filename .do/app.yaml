name: free-crypto-news
services:
  - name: web
    github:
      repo: nirholas/free-crypto-news
      branch: main
      deploy_on_push: true
    build_command: pnpm install && pnpm run build
    run_command: pnpm run start
    http_port: 3000
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        type: SECRET
    health_check:
      http_path: /api/health
