<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 100" width="600" height="100">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- "crypto" in serif -->
  <text x="20" y="72"
        font-family="Georgia,'Times New Roman',serif"
        font-size="52" font-weight="400" letter-spacing="1" fill="#e2e8f0">crypto</text>

  <!-- Oversized "V" — the hero letter, in white -->
  <text x="262" y="72"
        font-family="Georgia,'Times New Roman',serif"
        font-size="72" font-weight="700" fill="#ffffff">V</text>

  <!-- "ision" completing the word -->
  <text x="310" y="72"
        font-family="Georgia,'Times New Roman',serif"
        font-size="52" font-weight="400" letter-spacing="1" fill="#e2e8f0">ision</text>

  <!-- Thin editorial rule beneath -->
  <rect x="18" y="86" width="550" height="1" fill="#475569"/>

  <!-- Tagline -->
  <text x="20" y="98"
        font-family="Georgia,'Times New Roman',serif"
        font-size="10" font-weight="400" letter-spacing="4" fill="#94a3b8">REAL-TIME CRYPTO INTELLIGENCE</text>
</svg>
