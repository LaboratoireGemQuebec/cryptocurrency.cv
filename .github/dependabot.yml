# Dependabot — Automated Dependency Updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # npm / pnpm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "nirholas"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps):"
      prefix-development: "chore(dev-deps):"
    # Group minor/patch updates to reduce PR noise
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      next-ecosystem:
        patterns:
          - "next"
          - "next-intl"
          - "@next/*"
          - "react"
          - "react-dom"
      linting:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "prettier*"
          - "typescript-eslint*"
      testing:
        patterns:
          - "vitest*"
          - "@vitest/*"
          - "playwright*"
          - "@playwright/*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "nirholas"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps):"

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    reviewers:
      - "nirholas"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker):"
