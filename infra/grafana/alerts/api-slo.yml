groups:
  - name: api-slo
    rules:
      - alert: HighErrorRate
        expr: rate(api_requests_total{status=~"5.."}[5m]) / rate(api_requests_total[5m]) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Error rate exceeds 1% for 5 minutes"
      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(api_latency_ms_bucket[5m])) > 5000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "p99 latency exceeds 5s"
      - alert: CircuitBreakerOpen
        expr: circuit_breaker_state{state="open"} > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker open for {{ $labels.provider }}"
      - alert: CacheHitRateLow
        expr: rate(cache_hits_total[5m]) / (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m])) < 0.7
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Cache hit rate below 70%"
      - alert: WebSocketConnectionSpike
        expr: delta(ws_connections_total[5m]) > 1000
        for: 2m
        labels:
          severity: info
        annotations:
          summary: "WebSocket connections spiked by 1000+ in 5 minutes"
      - alert: HighMessageDropRate
        expr: rate(ws_messages_dropped_total[5m]) / rate(ws_messages_sent_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "WebSocket message drop rate exceeds 5%"
