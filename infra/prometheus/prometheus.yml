global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: 'next-app'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['app:3000']

  - job_name: 'websocket'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['websocket:8080']

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
