services:
  - type: web
    name: free-crypto-news
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: crypto-news-cache
          property: connectionString
    healthCheckPath: /api/health

  - type: redis
    name: crypto-news-cache
    plan: free
    maxmemoryPolicy: allkeys-lru
